<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aksu Baharat</title>
<style>

  margin:0;
  font-family:Arial, sans-serif;
  background:linear-gradient(#fff,#f3f3f3);
  text-align:center;
  color:#333;
}
.logo{
  width:260px;
  margin-top:40px;
  mix-blend-mode:multiply;
}
.title{
  font-size:32px;
  font-weight:bold;
  margin-top:20px;
}
.subtitle{
  font-size:18px;
  color:#666;
  margin-top:10px;
}
.btn{
  margin-top:40px;
  padding:15px 25px;
  font-size:18px;
  background:#d32f2f;
  color:white;
  border:none;
  border-radius:12px;
  cursor:pointer;
}
</style>
</head>
<body>

<img src="aksu-logo.png" class="logo" alt="Aksu Baharat Logo">

<div class="title">AKSU BAHARAT</div>
<div class="subtitle">60 yıllık tecrübe ve kalite</div>

<button class="btn" onclick="goInfo()">Bilgiler için tıklayınız</button>

<script>
function goInfo(){
  window.location.href = "info.html";
}
</script>

</body>
</html>
